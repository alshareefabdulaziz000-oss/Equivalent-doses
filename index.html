<!DOCTYPE html>

<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equivalent Doses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Source+Serif+4:ital,wght@0,600;0,700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F6F9;--surface:#FFFFFF;--surface-alt:#EDF1F7;--border:#D8DEE8;--border-light:#E8ECF2;--text:#1A2332;--text-sec:#5A6A7E;--text-muted:#8896A8;--accent:#1B5E8A;--accent-light:#E8F1F8;--accent-hover:#154A6E;--accent-glow:rgba(27,94,138,0.08);--warning:#8B6914;--warning-bg:#FFF8E7;--warning-border:#E8D9A0;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 3px rgba(26,35,50,0.06);--shadow-lg:0 8px 30px rgba(26,35,50,0.1);--tr:180ms ease}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100dvh;overflow-x:hidden}
.app-container{max-width:640px;margin:0 auto;padding:0 16px 80px}
.app-header{position:sticky;top:0;z-index:100;background:rgba(244,246,249,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 12px;border-bottom:1px solid var(--border-light)}
.header-inner{max-width:640px;margin:0 auto;padding:0 16px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:42px;height:42px;border-radius:10px;object-fit:contain;flex-shrink:0}
.brand h1{font-family:'Source Serif 4',Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.brand-sub{font-size:0.72rem;color:var(--text-muted);font-weight:400;display:block;margin-top:-1px;font-family:'DM Sans',sans-serif}
.author-credit{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:0.68rem;color:var(--accent);opacity:0.75;text-align:right;line-height:1.3;padding-top:4px;white-space:nowrap}
.search-wrap{position:relative}.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-input{width:100%;padding:10px 40px 10px 38px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:0.93rem;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color var(--tr),box-shadow var(--tr);outline:none}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.search-input::placeholder{color:var(--text-muted)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:var(--border);color:var(--text-sec);border-radius:50%;cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center;line-height:1}.search-clear.show{display:flex}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);max-height:300px;overflow-y:auto;z-index:200;display:none}.search-results.active{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border-light);transition:background var(--tr)}.sr-item:last-child{border-bottom:none}.sr-item:hover,.sr-item.hl{background:var(--accent-light)}
.sr-drug{font-weight:600;font-size:0.93rem;color:var(--text)}.sr-meta{font-size:0.76rem;color:var(--text-muted);margin-top:1px}.sr-str{font-size:0.72rem;color:var(--accent);margin-top:2px}
.breadcrumb{display:flex;align-items:center;gap:4px;padding:14px 0 6px;font-size:0.78rem;color:var(--text-muted);flex-wrap:wrap;min-height:38px}
.bc-item{cursor:pointer;color:var(--accent);font-weight:500;transition:color var(--tr);white-space:nowrap}.bc-item:hover{color:var(--accent-hover);text-decoration:underline}
.bc-sep{color:var(--border);font-size:0.7rem;user-select:none}.bc-cur{color:var(--text-sec);font-weight:500;white-space:nowrap}
.step-label{font-size:0.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.68rem;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border-light);border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:all var(--tr);user-select:none}
.card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm);transform:translateY(-1px)}.card:active{transform:translateY(0)}
.card-title{font-weight:600;font-size:0.91rem;color:var(--text);line-height:1.3}.card-sub{font-size:0.76rem;color:var(--text-muted);margin-top:3px}
.dose-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.dose-pill{padding:8px 16px;border:1.5px solid var(--border);border-radius:100px;font-size:0.88rem;font-weight:600;background:var(--surface);cursor:pointer;transition:all var(--tr);color:var(--text);white-space:nowrap}
.dose-pill:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.results-section{animation:fadeUp 300ms ease}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{background:var(--accent);color:#fff;border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.result-header h3{font-family:'Source Serif 4',Georgia,serif;font-size:1.15rem;font-weight:700;margin-bottom:2px}.result-header-sub{font-size:0.82rem;opacity:0.8}
.eq-table{width:100%;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;border:1.5px solid var(--border-light);box-shadow:var(--shadow-sm)}
.eq-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-light);transition:background var(--tr);gap:12px}
.eq-row:last-child{border-bottom:none}.eq-row:hover{background:var(--accent-glow)}.eq-row.is-sel{background:var(--accent-light);border-left:3px solid var(--accent)}
.eq-drug{font-weight:600;font-size:0.91rem;color:var(--text)}.eq-ref{font-size:0.7rem;color:var(--accent);font-weight:500;margin-left:4px;background:var(--accent-light);padding:1px 6px;border-radius:4px}
.eq-nearest{font-size:0.73rem;color:var(--text-muted);margin-top:2px}.eq-dose{font-weight:700;font-size:1rem;color:var(--accent);white-space:nowrap;text-align:right}
.disclaimer{margin-top:20px;padding:14px 16px;background:var(--warning-bg);border:1px solid var(--warning-border);border-radius:var(--radius-md);font-size:0.8rem;color:var(--warning);line-height:1.5}.disclaimer strong{font-weight:700}
.note-box{margin-top:12px;padding:10px 14px;background:var(--surface-alt);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text-sec)}
.ref-toggle{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-sec);cursor:pointer;transition:all var(--tr);user-select:none}
.ref-toggle:hover{background:var(--accent-light);color:var(--accent)}.ref-toggle svg{width:14px;height:14px;transition:transform 250ms ease}.ref-toggle.open svg{transform:rotate(180deg)}
.ref-box{margin-top:8px;padding:12px 16px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--text-sec);line-height:1.6;display:none}.ref-box.vis{display:block}
.home-intro{text-align:center;padding:24px 10px 18px}.home-intro h2{font-family:'Source Serif 4',Georgia,serif;font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:5px}.home-intro p{font-size:0.86rem;color:var(--text-sec);max-width:400px;margin:0 auto}

.footer-refs{margin-top:32px;padding:20px;background:var(–surface);border:1.5px solid var(–border-light);border-radius:var(–radius-lg)}
.footer-refs h4{font-family:‘Source Serif 4’,Georgia,serif;font-size:0.95rem;color:var(–text);margin-bottom:10px}.footer-refs ul{list-style:none;padding:0}
.footer-refs li{font-size:0.8rem;color:var(–text-sec);padding:4px 0;padding-left:16px;position:relative;line-height:1.5}.footer-refs li::before{content:”\2022”;position:absolute;left:0;color:var(–accent)}
.footer-refs .ref-note{margin-top:10px;font-size:0.76rem;color:var(–text-muted);font-style:italic;line-height:1.5}
.fade-in{animation:fadeUp 250ms ease}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(–border);border-radius:10px}
@media(max-width:400px){.cards-grid{gap:8px}.card{padding:12px 14px}.eq-row{padding:12px 14px}.author-credit{font-size:0.6rem}}
@media(min-width:480px){.cards-grid{grid-template-columns:repeat(3,1fr)}}
</style>

</head>

strengths:[250,500,750,1000],eqFactor:1},"Lamotrigine":{strengths:[25,50,100,200],eqFactor:0.1},"Topiramate":{strengths:[25,50,100,200],eqFactor:0.1},"Lacosamide":{strengths:[50,100,150,200],eqFactor:0.2},"Brivaracetam":{strengths:[10,25,50,75,100],eqFactor:0.05},"Pregabalin":{strengths:[25,50,75,100,150,200,300],eqFactor:0.15},"Gabapentin":{strengths:[100,300,400,600,800],eqFactor:0.6}}}}},"Thyroid Disorders":{classes:{"Thyroid Replacement":{ref:"Levothyroxine (T4)",unit:"mcg",note:"Levothyroxine 100mcg = Liothyronine 20mcg.",drugs:{"Levothyroxine (T4)":{strengths:[25,50,75,88,100,112,125,137,150,175,200],eqFactor:1},"Liothyronine (T3)":{strengths:[5,10,20,25,50],eqFactor:0.2}}},"Antithyroid Drugs":{ref:"Carbimazole",unit:"mg",note:"Carbimazole 10 = Methimazole 10 = PTU 100.",drugs:{"Carbimazole":{strengths:[5,10,20],eqFactor:1},"Methimazole":{strengths:[5,10,20],eqFactor:1},"Propylthiouracil":{strengths:[50,100],eqFactor:10}}}}},"Osteoporosis":{classes:{"Bisphosphonates":{ref:"Alendronate",unit:"mg",note:"Weekly: Alendronate 70 = Risedronate 35. Monthly: Ibandronate 150.",drugs:{"Alendronate":{strengths:[5,10,35,70],eqFactor:1},"Risedronate":{strengths:[5,35,150],eqFactor:0.5},"Ibandronate":{strengths:[2.5,150],eqFactor:2.14},"Zoledronic Acid":{strengths:[4,5],eqFactor:0.0714}}}}}};

var searchIndex=[],totalDrugs=0,totalClasses=0,totalDiseases=0;
for(var disease in DB){totalDiseases++;for(var cn in DB[disease].classes){totalClasses++;for(var dn in DB[disease].classes[cn].drugs){totalDrugs++;searchIndex.push({drug:dn,disease:disease,className:cn,shortClass:cn.replace(/\s*(.*?)\s*/g,’’).trim(),strengths:DB[disease].classes[cn].drugs[dn].strengths,unit:DB[disease].classes[cn].unit});}}}

var state={disease:null,className:null,drug:null,dose:null};
var contentEl=document.getElementById(‘content’),breadcrumbEl=document.getElementById(‘breadcrumb’),searchInput=document.getElementById(‘searchInput’),searchResultsEl=document.getElementById(‘searchResults’),searchClear=document.getElementById(‘searchClear’);

function render(){updateBreadcrumb();if(state.dose!==null)renderResults();else if(state.drug)renderDoses();else if(state.className)renderDrugs();else if(state.disease)renderClasses();else renderHome();window.scrollTo({top:0,behavior:‘smooth’});}

function renderHome(){
var h=’<div class="home-intro fade-in"><h2>Select a Therapeutic Area</h2><p>Find equivalent doses across drugs within the same class</p></div>’;
h+=’<div class="step-label"><span class="step-num">1</span> Therapeutic Area</div><div class="cards-grid fade-in">’;
for(var d in DB){var cc=Object.keys(DB[d].classes).length;var dc=0;for(var c in DB[d].classes)dc+=Object.keys(DB[d].classes[c].drugs).length;h+=’<div class="card" onclick="sel(\'disease\',\''+esc(d)+'\')"><div class="card-title">’+d+’</div><div class="card-sub">’+cc+’ class’+(cc>1?‘es’:’’)+’ · ‘+dc+’ drugs</div></div>’;}
h+=’</div>’;
h+=’<div class="footer-refs" style="margin-top:32px"><h4>📚 Reference Sources</h4><ul><li><strong>British National Formulary (BNF 86)</strong> — NICE, UK</li><li><strong>Lexicomp® 2024</strong> — Wolters Kluwer</li><li><strong>Micromedex® Solutions</strong> — Merative</li><li><strong>UpToDate®</strong> — Wolters Kluwer</li><li><strong>GINA 2024</strong> — ICS dose equivalence</li><li><strong>CDC Opioid MME Tables</strong></li><li><strong>Ashton Manual</strong> — Benzodiazepine equivalence</li><li><strong>Stahl's Essential Psychopharmacology</strong> — CPZE</li><li><strong>WHO ATC/DDD Index 2024</strong></li><li><strong>Saudi National Formulary (SNF)</strong> — SFDA</li></ul><div class="ref-note">⚠ All dose equivalences are approximate. Individual patient factors may require adjustment. This tool does not replace clinical judgment.</div></div>’;
contentEl.innerHTML=h;
}

function renderClasses(){var h=’<div class="step-label fade-in"><span class="step-num">2</span> Drug Class</div><div class="cards-grid fade-in">’;for(var c in DB[state.disease].classes){var dc=Object.keys(DB[state.disease].classes[c].drugs).length;var short=c.replace(/\s*(.*?)\s*/g,’ ‘).trim();h+=’<div class="card" onclick="sel(\'class\',\''+esc(c)+'\')"><div class="card-title">’+short+’</div><div class="card-sub">’+dc+’ drugs · ref: ‘+DB[state.disease].classes[c].ref+’</div></div>’;}h+=’</div>’;contentEl.innerHTML=h;}

function renderDrugs(){var cls=DB[state.disease].classes[state.className];var h=’<div class="step-label fade-in"><span class="step-num">3</span> Select Drug</div><div class="cards-grid fade-in">’;for(var d in cls.drugs){var info=cls.drugs[d];var isRef=d===cls.ref;h+=’<div class="card" onclick="sel(\'drug\',\''+esc(d)+'\')"><div class="card-title">’+d+(isRef?’ <span class="eq-ref">REF</span>’:’’)+’</div><div class="card-sub">’+info.strengths.map(function(s){return s+’ ‘+cls.unit;}).join(’, ‘)+’</div></div>’;}h+=’</div>’;contentEl.innerHTML=h;}

function renderDoses(){var cls=DB[state.disease].classes[state.className];var drug=cls.drugs[state.drug];var h=’<div class="step-label fade-in"><span class="step-num">4</span> Select Dose — ‘+state.drug+’</div><div class="dose-options fade-in">’;drug.strengths.forEach(function(s){h+=’<div class="dose-pill" onclick="sel(\'dose\','+s+')">’+s+’ ‘+cls.unit+’</div>’;});h+=’</div>’;contentEl.innerHTML=h;}

function renderResults(){var cls=DB[state.disease].classes[state.className];var selDrug=cls.drugs[state.drug];var refDose=state.dose/selDrug.eqFactor;var h=’<div class="results-section"><div class="result-header"><h3>’+state.drug+’ ‘+state.dose+’ ‘+cls.unit+’</h3><div class="result-header-sub">’+state.className+’ · ‘+state.disease+’</div></div><div class="eq-table">’;for(var name in cls.drugs){var info=cls.drugs[name];var eq=refDose*info.eqFactor;var d=smartRound(eq);var n=findNearest(info.strengths,eq);var isSel=name===state.drug;var isRef=name===cls.ref;h+=’<div class="eq-row'+(isSel?' is-sel':'')+'"><div><span class="eq-drug">’+name+’</span>’+(isRef?’<span class="eq-ref">REF</span>’:’’)+(n!==d?’<div class="eq-nearest">Nearest: ‘+n+’ ‘+cls.unit+’</div>’:’’)+’</div><div class="eq-dose">’+d+’ ‘+cls.unit+’</div></div>’;}h+=’</div>’;if(cls.note)h+=’<div class="note-box">ℹ️ ‘+cls.note+’</div>’;h+=’<div class="disclaimer"><strong>⚠ Disclaimer:</strong> Approximate equivalence only. Always verify with BNF, Lexicomp, or Micromedex.</div>’;h+=’<div class="ref-toggle" id="refToggle" onclick="toggleRef()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>Show Reference Sources</div>’;h+=’<div class="ref-box" id="refBox"><strong>Sources:</strong><br>• BNF 86 • Lexicomp® 2024 • Micromedex® • UpToDate®<br>• GINA 2024 • CDC MME • Ashton Manual • Stahl's • WHO ATC/DDD<br><br><em>Always exercise clinical judgment.</em></div></div>’;contentEl.innerHTML=h;}

function sel(type,val){if(type===‘disease’)state={disease:val,className:null,drug:null,dose:null};else if(type===‘class’){state.className=val;state.drug=null;state.dose=null;}else if(type===‘drug’){state.drug=val;state.dose=null;}else if(type===‘dose’){state.dose=parseFloat(val);}render();}
function goHome(){state={disease:null,className:null,drug:null,dose:null};render();}
function goDisease(){state.className=null;state.drug=null;state.dose=null;render();}
function goClass(){state.drug=null;state.dose=null;render();}
function goDrug(){state.dose=null;render();}

function updateBreadcrumb(){var h=’<span class="bc-item" onclick="goHome()">Home</span>’;if(state.disease){h+=’<span class="bc-sep">›</span>’;h+=state.className?’<span class="bc-item" onclick="goDisease()">’+state.disease+’</span>’:’<span class="bc-cur">’+state.disease+’</span>’;}if(state.className){var s=state.className.replace(/\s*(.*?)\s*/g,’ ‘).trim();h+=’<span class="bc-sep">›</span>’;h+=state.drug?’<span class="bc-item" onclick="goClass()">’+s+’</span>’:’<span class="bc-cur">’+s+’</span>’;}if(state.drug){h+=’<span class="bc-sep">›</span>’;if(state.dose!==null){h+=’<span class="bc-item" onclick="goDrug()">’+state.drug+’</span><span class="bc-sep">›</span><span class="bc-cur">’+state.dose+’ ‘+DB[state.disease].classes[state.className].unit+’</span>’;}else{h+=’<span class="bc-cur">’+state.drug+’</span>’;}}breadcrumbEl.innerHTML=h;}

var shl=-1;
searchInput.addEventListener(‘input’,function(){var q=this.value.trim().toLowerCase();searchClear.classList.toggle(‘show’,q.length>0);shl=-1;if(q.length<2){searchResultsEl.classList.remove(‘active’);return;}var matches=searchIndex.filter(function(it){return it.drug.toLowerCase().indexOf(q)!==-1;}).slice(0,10);if(!matches.length){searchResultsEl.classList.remove(‘active’);return;}var h=’’;matches.forEach(function(m,i){h+=’<div class="sr-item" onclick="jumpTo(\''+esc(m.disease)+'\',\''+esc(m.className)+'\',\''+esc(m.drug)+'\')"><div class="sr-drug">’+hlMatch(m.drug,q)+’</div><div class="sr-meta">’+m.disease+’ → ‘+m.shortClass+’</div><div class="sr-str">’+m.strengths.map(function(s){return s+’ ‘+m.unit;}).join(’ · ‘)+’</div></div>’;});searchResultsEl.innerHTML=h;searchResultsEl.classList.add(‘active’);});
searchInput.addEventListener(‘keydown’,function(e){var items=searchResultsEl.querySelectorAll(’.sr-item’);if(!items.length)return;if(e.key===‘ArrowDown’){e.preventDefault();shl=Math.min(shl+1,items.length-1);hlItems(items);}else if(e.key===‘ArrowUp’){e.preventDefault();shl=Math.max(shl-1,0);hlItems(items);}else if(e.key===‘Enter’&&shl>=0){e.preventDefault();items[shl].click();}else if(e.key===‘Escape’){searchResultsEl.classList.remove(‘active’);searchInput.blur();}});
function hlItems(items){for(var i=0;i<items.length;i++)items[i].classList.toggle(‘hl’,i===shl);}
function jumpTo(d,c,dr){state={disease:d,className:c,drug:dr,dose:null};searchResultsEl.classList.remove(‘active’);searchInput.value=’’;searchClear.classList.remove(‘show’);render();}
function clearSearch(){searchInput.value=’’;searchClear.classList.remove(‘show’);searchResultsEl.classList.remove(‘active’);searchInput.focus();}
document.addEventListener(‘click’,function(e){if(!e.target.closest(’.search-wrap’))searchResultsEl.classList.remove(‘active’);});

function esc(s){return s.replace(/’/g,”\’”).replace(/”/g,’"’);}
function hlMatch(t,q){var i=t.toLowerCase().indexOf(q);if(i===-1)return t;return t.slice(0,i)+’<strong style="color:var(--accent)">’+t.slice(i,i+q.length)+’</strong>’+t.slice(i+q.length);}
function smartRound(v){if(v>=100)return Math.round(v);if(v>=10)return Math.round(v*10)/10;if(v>=1)return Math.round(v*100)/100;return Math.round(v*1000)/1000;}
function findNearest(s,t){var b=s[0],bd=Math.abs(s[0]-t);for(var i=1;i<s.length;i++){var d=Math.abs(s[i]-t);if(d<bd){b=s[i];bd=d;}}return b;}
function toggleRef(){var t=document.getElementById(‘refToggle’),b=document.getElementById(‘refBox’);t.classList.toggle(‘open’);b.classList.toggle(‘vis’);var isOpen=t.classList.contains(‘open’);t.innerHTML=’<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>’+(isOpen?‘Hide’:‘Show’)+’ Reference Sources’;}

render();
</script>
