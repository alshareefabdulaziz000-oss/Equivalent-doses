<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F6F9;--sf:#FFF;--sa:#EDF1F7;--bd:#D8DEE8;--bl:#E8ECF2;--tx:#1A2332;--ts:#5A6A7E;--tm:#8896A8;--ac:#1B5E8A;--al:#E8F1F8;--ah:#154A6E;--ag:rgba(27,94,138,.08);--wn:#8B6914;--wb:#FFF8E7;--wbd:#E8D9A0;--rs:8px;--rm:12px;--rl:16px;--ss:0 1px 3px rgba(26,35,50,.06);--sl:0 8px 30px rgba(26,35,50,.1);--tr:180ms ease}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.55;min-height:100dvh}
.ac{max-width:640px;margin:0 auto;padding:0 16px 80px}
.ah{position:sticky;top:0;z-index:100;background:rgba(244,246,249,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 12px;border-bottom:1px solid var(--bl)}
.hi{max-width:640px;margin:0 auto;padding:0 16px}
.ht{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.br{display:flex;align-items:center;gap:10px}
.bl{width:42px;height:42px;border-radius:10px;object-fit:contain;flex-shrink:0}
.br h1{font-family:'Source Serif 4',Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--tx)}
.bs{font-size:.72rem;color:var(--tm);font-weight:400;display:block;margin-top:-1px;font-family:'DM Sans',sans-serif}
.cr{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:.68rem;color:var(--ac);opacity:.75;text-align:right;line-height:1.3;padding-top:4px;white-space:nowrap}
.sw{position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none}
.sin{width:100%;padding:10px 40px 10px 38px;border:1.5px solid var(--bd);border-radius:var(--rm);font-size:.93rem;font-family:inherit;background:var(--sf);color:var(--tx);outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
.sin:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}
.sin::placeholder{color:var(--tm)}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:var(--bd);color:var(--ts);border-radius:50%;cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center}
.sc.show{display:flex}
.sr{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--rm);box-shadow:var(--sl);max-height:300px;overflow-y:auto;z-index:200;display:none}
.sr.active{display:block}
.sri{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bl);transition:background var(--tr)}
.sri:last-child{border-bottom:none}
.sri:hover,.sri.hl{background:var(--al)}
.srd{font-weight:600;font-size:.93rem;color:var(--tx)}
.srm{font-size:.76rem;color:var(--tm);margin-top:1px}
.srs{font-size:.72rem;color:var(--ac);margin-top:2px}
.bc{display:flex;align-items:center;gap:4px;padding:14px 0 6px;font-size:.78rem;color:var(--tm);flex-wrap:wrap;min-height:38px}
.bi{cursor:pointer;color:var(--ac);font-weight:500;white-space:nowrap}
.bi:hover{color:var(--ah);text-decoration:underline}
.bp{color:var(--bd);font-size:.7rem}
.bk{color:var(--ts);font-weight:500;white-space:nowrap}
.sl{font-size:.78rem;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sn{width:20px;height:20px;border-radius:50%;background:var(--ac);color:#fff;font-size:.68rem;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cd{background:var(--sf);border:1.5px solid var(--bl);border-radius:var(--rm);padding:14px 16px;cursor:pointer;transition:all var(--tr);user-select:none}
.cd:hover{border-color:var(--ac);box-shadow:var(--ss);transform:translateY(-1px)}
.cd:active{transform:translateY(0)}
.ct{font-weight:600;font-size:.91rem;color:var(--tx);line-height:1.3}
.cu{font-size:.76rem;color:var(--tm);margin-top:3px}
.do{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.dp{padding:8px 16px;border:1.5px solid var(--bd);border-radius:100px;font-size:.88rem;font-weight:600;background:var(--sf);cursor:pointer;transition:all var(--tr);color:var(--tx);white-space:nowrap}
.dp:hover{border-color:var(--ac);background:var(--al);color:var(--ac)}
.rs{animation:fu 300ms ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rh{background:var(--ac);color:#fff;border-radius:var(--rl);padding:20px;margin-bottom:16px}
.rh h3{font-family:'Source Serif 4',Georgia,serif;font-size:1.15rem;font-weight:700;margin-bottom:2px}
.rhs{font-size:.82rem;opacity:.8}
.et{width:100%;background:var(--sf);border-radius:var(--rl);overflow:hidden;border:1.5px solid var(--bl);box-shadow:var(--ss)}
.er{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bl);transition:background var(--tr);gap:12px}
.er:last-child{border-bottom:none}
.er:hover{background:var(--ag)}
.er.es{background:var(--al);border-left:3px solid var(--ac)}
.ed{font-weight:600;font-size:.91rem;color:var(--tx)}
.ef{font-size:.7rem;color:var(--ac);font-weight:500;margin-left:4px;background:var(--al);padding:1px 6px;border-radius:4px}
.en{font-size:.73rem;color:var(--tm);margin-top:2px}
.ev{font-weight:700;font-size:1rem;color:var(--ac);white-space:nowrap}
.di{margin-top:20px;padding:14px 16px;background:var(--wb);border:1px solid var(--wbd);border-radius:var(--rm);font-size:.8rem;color:var(--wn);line-height:1.5}
.di strong{font-weight:700}
.nb{margin-top:12px;padding:10px 14px;background:var(--sa);border-radius:var(--rs);font-size:.8rem;color:var(--ts)}
.rt{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;background:var(--sa);border:1px solid var(--bd);border-radius:var(--rs);font-size:.78rem;color:var(--ts);cursor:pointer;transition:all var(--tr)}
.rt:hover{background:var(--al);color:var(--ac)}
.rt svg{width:14px;height:14px;transition:transform 250ms ease}
.rt.open svg{transform:rotate(180deg)}
.rb{margin-top:8px;padding:12px 16px;background:var(--sf);border:1px solid var(--bl);border-radius:var(--rs);font-size:.8rem;color:var(--ts);line-height:1.6;display:none}
.rb.vis{display:block}
.hm{text-align:center;padding:24px 10px 18px}
.hm h2{font-family:'Source Serif 4',Georgia,serif;font-size:1.25rem;font-weight:700;margin-bottom:5px}
.hm p{font-size:.86rem;color:var(--ts);max-width:400px;margin:0 auto}
.fr{margin-top:32px;padding:20px;background:var(--sf);border:1.5px solid var(--bl);border-radius:var(--rl)}
.fr h4{font-family:'Source Serif 4',Georgia,serif;font-size:.95rem;margin-bottom:10px}
.fr ul{list-style:none;padding:0}
.fr li{font-size:.8rem;color:var(--ts);padding:4px 0 4px 16px;position:relative;line-height:1.5}
.fr li::before{content:"\2022";position:absolute;left:0;color:var(--ac)}
.fr .rn{margin-top:10px;font-size:.76rem;color:var(--tm);font-style:italic;line-height:1.5}
.fi{animation:fu 250ms ease}
@media(max-width:400px){.cg{gap:8px}.cd{padding:12px}.er{padding:12px 14px}.cr{font-size:.6rem}}
@media(min-width:480px){.cg{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

function rHo(){var h='<div class="hm fi"><h2>Select a Therapeutic Area</h2><p>Find equivalent doses across drugs within the same class</p></div>';h+='<div class="sl"><span class="sn">1</span> Therapeutic Area</div><div class="cg fi">';DK.forEach(function(d){var cc=Object.keys(DB[d].c).length,dc=0;Object.keys(DB[d].c).forEach(function(c){dc+=Object.keys(DB[d].c[c].d).length;});h+='<div class="cd" data-a="ds" data-v="'+d+'"><div class="ct">'+d+'</div><div class="cu">'+cc+" class"+(cc>1?"es":"")+" &middot; "+dc+" drugs</div></div>";});h+="</div>";h+='<div class="fr" style="margin-top:32px"><h4>&#128218; Reference Sources</h4><ul>';h+="<li><strong>BNF 86</strong> &mdash; NICE, UK</li>";h+="<li><strong>Lexicomp 2024</strong> &mdash; Wolters Kluwer</li>";h+="<li><strong>Micromedex</strong> &mdash; Merative</li>";h+="<li><strong>UpToDate</strong> &mdash; Wolters Kluwer</li>";h+="<li><strong>GINA 2024</strong> &mdash; ICS equivalence</li>";h+="<li><strong>CDC Opioid MME Tables</strong></li>";h+="<li><strong>Ashton Manual</strong> &mdash; Benzo equivalence</li>";h+="<li><strong>Stahl&#39;s Psychopharmacology</strong> &mdash; CPZE</li>";h+="<li><strong>WHO ATC/DDD 2024</strong></li>";h+="<li><strong>Saudi National Formulary</strong> &mdash; SFDA</li>";h+='</ul><div class="rn">&#9888; Approximate equivalences. Individual patient factors may require adjustment. Does not replace clinical judgment.</div></div>';CE.innerHTML=h;}
function rCl(){var h='<div class="sl fi"><span class="sn">2</span> Drug Class</div><div class="cg fi">';Object.keys(DB[S.ds].c).forEach(function(c){var dc=Object.keys(DB[S.ds].c[c].d).length;h+='<div class="cd" data-a="cl" data-v="'+c+'"><div class="ct">'+c+'</div><div class="cu">'+dc+" drugs &middot; ref: "+DB[S.ds].c[c].r+"</div></div>";});h+="</div>";CE.innerHTML=h;}
function rDr(){var cl=DB[S.ds].c[S.cn];var h='<div class="sl fi"><span class="sn">3</span> Select Drug</div><div class="cg fi">';Object.keys(cl.d).forEach(function(d){var i=cl.d[d],rf=(d===cl.r);h+='<div class="cd" data-a="dr" data-v="'+d+'"><div class="ct">'+d+(rf?' <span class="ef">REF</span>':"")+'</div><div class="cu">'+i.s.map(function(v){return v+" "+cl.u;}).join(", ")+"</div></div>";});h+="</div>";CE.innerHTML=h;}
function rDo(){var cl=DB[S.ds].c[S.cn],dr=cl.d[S.dr];var h='<div class="sl fi"><span class="sn">4</span> Select Dose &mdash; '+S.dr+'</div><div class="do fi">';dr.s.forEach(function(v){h+='<div class="dp" data-a="do" data-v="'+v+'">'+v+" "+cl.u+"</div>";});h+="</div>";CE.innerHTML=h;}
function rRes(){var cl=DB[S.ds].c[S.cn],sd=cl.d[S.dr],rd=S.do/sd.f;var h='<div class="rs"><div class="rh"><h3>'+S.dr+" "+S.do+" "+cl.u+'</h3><div class="rhs">'+S.cn+" &middot; "+S.ds+'</div></div><div class="et">';Object.keys(cl.d).forEach(function(nm){var i=cl.d[nm],eq=rd*i.f,dv=R(eq),nv=FN(i.s,eq),sl=(nm===S.dr),rf=(nm===cl.r);h+='<div class="er'+(sl?" es":"")+'"><div><span class="ed">'+nm+"</span>"+(rf?'<span class="ef">REF</span>':"")+(nv!==dv?'<div class="en">Nearest: '+nv+" "+cl.u+"</div>":"")+'</div><div class="ev">'+dv+" "+cl.u+"</div></div>";});h+="</div>";if(cl.n)h+='<div class="nb">&#8505;&#65039; '+cl.n+"</div>";h+='<div class="di"><strong>&#9888; Disclaimer:</strong> Approximate equivalence only. Always verify with BNF, Lexicomp, or Micromedex.</div>';h+='<div class="rt" data-a="tr" id="rt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>Show Sources</div>';h+='<div class="rb" id="rb">&bull; BNF 86 &bull; Lexicomp 2024 &bull; Micromedex &bull; UpToDate &bull; GINA 2024 &bull; CDC MME &bull; Ashton Manual &bull; WHO ATC/DDD<br><br><em>Always exercise clinical judgment.</em></div></div>';CE.innerHTML=h;}
function UB(){var h='<span class="bi" data-a="hm">Home</span>';if(S.ds){h+='<span class="bp">&rsaquo;</span>';h+=S.cn?'<span class="bi" data-a="gd">'+S.ds+"</span>":'<span class="bk">'+S.ds+"</span>";}if(S.cn){h+='<span class="bp">&rsaquo;</span>';h+=S.dr?'<span class="bi" data-a="gc">'+S.cn+"</span>":'<span class="bk">'+S.cn+"</span>";}if(S.dr){h+='<span class="bp">&rsaquo;</span>';if(S.do!==null){h+='<span class="bi" data-a="gdr">'+S.dr+'</span><span class="bp">&rsaquo;</span><span class="bk">'+S.do+" "+DB[S.ds].c[S.cn].u+"</span>";}else{h+='<span class="bk">'+S.dr+"</span>";}}BE.innerHTML=h;}
function toggleRef(){var t=document.getElementById("rt"),b=document.getElementById("rb");if(!t||!b)return;t.classList.toggle("open");b.classList.toggle("vis");}
var shl=-1;
IN.addEventListener("input",function(){var q=this.value.trim().toLowerCase();SC.classList.toggle("show",q.length>0);shl=-1;if(q.length<2){SR.classList.remove("active");return;}var m=SI.filter(function(x){return x.drug.toLowerCase().indexOf(q)!==-1;}).slice(0,10);if(!m.length){SR.classList.remove("active");return;}var h="";m.forEach(function(x){var hl=x.drug,idx=hl.toLowerCase().indexOf(q);if(idx!==-1)hl=hl.slice(0,idx)+'<strong style="color:var(--ac)">'+hl.slice(idx,idx+q.length)+"</strong>"+hl.slice(idx+q.length);h+='<div class="sri" data-a="sj" data-ds="'+x.ds+'" data-cn="'+x.cn+'" data-dr="'+x.drug+'">';h+='<div class="srd">'+hl+"</div>";h+='<div class="srm">'+x.ds+" &rarr; "+x.sc+"</div>";h+='<div class="srs">'+x.st.map(function(v){return v+" "+x.u;}).join(" &middot; ")+"</div></div>";});SR.innerHTML=h;SR.classList.add("active");});
IN.addEventListener("keydown",function(e){var it=SR.querySelectorAll(".sri");if(!it.length)return;if(e.key==="ArrowDown"){e.preventDefault();shl=Math.min(shl+1,it.length-1);}else if(e.key==="ArrowUp"){e.preventDefault();shl=Math.max(shl-1,0);}else if(e.key==="Enter"&&shl>=0){e.preventDefault();it[shl].click();return;}else if(e.key==="Escape"){SR.classList.remove("active");IN.blur();return;}for(var i=0;i<it.length;i++)it[i].classList.toggle("hl",i===shl);});
render();
</script>
