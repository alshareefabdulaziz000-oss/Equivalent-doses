<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Equivalent Doses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <img class="brand-logo" src="logo.jpg" alt="ED">
          <div>
            <h1>Equivalent Doses<span class="brand-sub">Clinical Dose Converter</span></h1>
          </div>
        </div>
        <div class="author-credit">By PharmD<br>Abdulaziz Alshareef</div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search any drug name..." autocomplete="off" spellcheck="false">
        <button class="search-clear" id="searchClear">&times;</button>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </header>
  <main class="app-container">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div id="content"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
